# application-example.properties
# Este archivo muestra cómo configurar reCAPTCHA v3

spring.application.name=microservicio-seguridad
server.port=8181

# MongoDB
spring.mongodb.uri=mongodb+srv://usuario:contraseńa@cluster.mongodb.net/?appName=Cluster0
spring.mongodb.database=db_seguridad

# JWT
jwt.secret=tu_secret_key_aqui
jwt.expiration=3600000

# ============================================================
# Google reCAPTCHA v3 Configuration
# ============================================================

# Secret Key: Obtén tu clave secreta desde https://www.google.com/recaptcha/admin
# IMPORTANTE: NUNCA compartas esta clave en control de versiones
# Recomendado: Usar variables de entorno o AWS Secrets Manager en producción
recaptcha.secret-key=6LduXL0pAAAAABmWLLMyRqDXXX...

# Score mínimo: Puntuación mínima aceptada (0.0 a 1.0)
# 0.0 = Con seguridad es un bot
# 0.3 = Posible bot o actividad sospechosa
# 0.5 = Neutral (recomendado para producción)
# 0.7 = Probablemente usuario legítimo
# 1.0 = Con seguridad es un usuario legítimo
recaptcha.min-score=0.5

# ============================================================
# NOTAS DE SEGURIDAD
# ============================================================
#
# 1. NUNCA commits la secret key con valor real en el repositorio
# 2. Usa variables de entorno: recaptcha_secret_key=${RECAPTCHA_SECRET_KEY}
# 3. En producción, utiliza un gestor de secretos (AWS Secrets, Azure KeyVault, etc.)
# 4. La validación SIEMPRE debe hacerse en el servidor
# 5. El token de reCAPTCHA es de una sola vez, no lo reutilices
#
# ============================================================
# OBTENER LAS CLAVES
# ============================================================
#
# 1. Ve a https://www.google.com/recaptcha/admin
# 2. Crea un nuevo sitio:
#    - Nombre: Tu aplicación
#    - Tipo: reCAPTCHA v3
#    - Dominios: localhost (desarrollo), tu dominio (producción)
# 3. Google te dará Site Key (frontend) y Secret Key (backend)
#
# ============================================================

